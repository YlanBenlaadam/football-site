<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoccerPlay - Contact</title>
  <link rel="stylesheet" href="./styles/index.css" />
  <link rel="stylesheet" href="./styles/contact.css" />
</head>
<body>

  <!-- TOPBAR (identique aux autres pages) -->
  <header class="topbar">
    <div class="header-container">
      <div id="logo">⚽ SoccerPlay</div>
      <nav>
        <ul>
          <li><a href="./index.html#top">Accueil</a></li>
          <li><a href="./quiz/quiz.html">Nos Quiz</a></li>
          <li><a href="./index.html#jeux">Jeux Vidéo</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="top">

    <section class="hero">
      <div class="hero-inner">
        <h1>📬 Nous contacter</h1>
        <p>Une question, une suggestion ou juste un mot sympa ? Écris-nous !</p>
      </div>
    </section>

    <section class="form-section">

      <!-- 
        action = URL FormSubmit avec ton mail → le service envoie le contenu du form à cette adresse
        method="POST" → les données sont envoyées dans le corps de la requête (pas dans l'URL)
        Les "name" de chaque input = les clés que FormSubmit utilise pour construire le mail
        Donc tout les input sauf les hidden nous seront envoyer par mail
      -->
      <form action="https://formsubmit.co/ylanbenlaadammailpro@gmail.com" method="POST" class="contact-form">

        <!-- 
            Champ caché : désactive le captcha de FormSubmit
            RQ -> le "_" indique que l'instruction est pour le for submit donc c pas pour le formulaire
         
        -->
        <input type="hidden" name="_captcha" value="false" />

        <!-- Champ caché : redirige vers cette page après envoi au lieu de la page FormSubmit -->
        <input type="hidden" name="_next" value="https://ylanbenlaadam.github.io/football-site/contact.html" />

        <!-- Champ caché : sujet du mail reçu dans ta boîte -->
        <input type="hidden" name="_subject" value="Nouveau message SoccerPlay" />

        <label for="name">Ton pseudo</label>
        <input type="text" id="name" name="name" placeholder="Ex : Zidane10" required />

        <label for="email">Ton e-mail</label>
        <input type="email" id="email" name="email" placeholder="ton@email.com" required />

        <label for="subject">Sujet</label>
        <!-- select = menu déroulant, chaque option = un choix possible -->
        <select id="subject" name="subject" required>
          <option value="" >Choisis un sujet</option> <!--permet d'afficher un texte sur le rectangle du menu deroulant-->
          <option value="suggestion">Suggestion</option>
          <option value="question">Question</option>
          <option value="partenariat">Partenariat</option>
          <option value="autre">Autre</option>
        </select>

        <label for="message">Ton message</label>
        <!-- textarea = zone de texte multi-lignes (contrairement à input qui est sur une seule ligne) -->
        <textarea id="message" name="message" rows="6" placeholder="Écris ton message ici..." required></textarea>

        <button type="submit" class="btn-submit">Envoyer le message ⚽</button>
      </form>

    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 SoccerPlay - Tous droits réservés</p>
    <div class="footer-links">
      <a href="./contact.html">Nous contacter</a>
      <a href="./bug.html">Signaler un bug</a>
    </div>
  </footer>

</body>
</html>
