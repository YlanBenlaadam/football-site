<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FootAddict - Contact</title>
  <link rel="stylesheet" href="./styles/index.css" />
  <link rel="stylesheet" href="./styles/contact.css" />
</head>
<body>
  <!-- Particules flottantes -->
  <div id="particles"></div>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="header-container">
      <div id="logo">⚽ FootAddict</div>
      <nav>
        <ul>
          <li><a href="./index.html#top">Accueil</a></li>
          <li><a href="./quiz/quiz.html">Nos Quiz</a></li>
          <li><a href="./jeux/jeux.html">Jeux Vidéo</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="top">

    <section class="hero fade-in">
      <div class="hero-inner">
        <h1>📬 Nous contacter</h1>
        <p>Une question, une suggestion ou juste un mot sympa ? Écris-nous !</p>
      </div>
    </section>

    <section class="form-section fade-in">
      <form action="https://formsubmit.co/ylanbenlaadammailpro@gmail.com" method="POST" class="contact-form">

        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_next" value="https://ylanbenlaadam.github.io/football-site/contact.html" />
        <input type="hidden" name="_subject" value="Nouveau message FootAddict" />

        <label for="name">Ton pseudo</label>
        <input type="text" id="name" name="name" placeholder="Ex : Zidane10" required />

        <label for="email">Ton e-mail</label>
        <input type="email" id="email" name="email" placeholder="ton@email.com" required />

        <label for="subject">Sujet</label>
        <select id="subject" name="subject" required>
          <option value="">Choisis un sujet</option>
          <option value="suggestion">Suggestion</option>
          <option value="question">Question</option>
          <option value="partenariat">Partenariat</option>
          <option value="autre">Autre</option>
        </select>

        <label for="message">Ton message</label>
        <textarea id="message" name="message" rows="6" placeholder="Écris ton message ici..." required></textarea>

        <button type="submit" class="btn-submit">Envoyer le message ⚽</button>
      </form>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-container">
      <p>© 2026 FootAddict - Tous droits réservés</p>
      <div class="logo-container">
        <a href="https://x.com/FootAddicttt">
          <img src="images/twitter-logo.png" alt="Twitter">
        </a>
        <a href="https://www.instagram.com/foot_addictt/">
          <img src="images/insta-logo.png" alt="Instagram">
        </a>
        <a href="https://discord.gg/RyQT8xwV">
          <img src="images/discord-logo.png" alt="Discord">
        </a>
      </div>
      <div class="footer-links">
        <a href="./contact.html">Nous contacter</a>
        <a href="./bug.html">Signaler un bug</a>
      </div>
    </div>
  </footer>

  <script src="./scripts/animations.js"></script>
</body>
</html>
