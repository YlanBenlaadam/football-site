<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootAddict - Bug</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/bug.css">
</head>

<body>
    <header class="topbar">
        <div class="header-container">
            <div id="logo">⚽ FootAddict</div>
            <nav>
                <ul>
                    <li><a href="./index.html#top">Accueil</a></li>
                    <li><a href="./quiz/quiz.html">Nos Quiz</a></li>
                    <li><a href="./index.html#jeux">Jeux Vidéo</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="top">
    
        <section class="hero">
            <div class="hero-inner">
                <h1>⚠️ Signaler un bug</h1>
                <p>Un bug a signaler sur le site, remplissez le formulaire ci-dessous !</p>
            </div>
        </section>

        <section class="form-section">
            <!-- Ouverture du form : tout ce qui est dedans sera envoyé par POST à FormSubmit -->
            <form action="https://formsubmit.co/ylanbenlaadammailpro@gmail.com" method="POST" class="bug-form">

                <input type="hidden" name="_captcha" value="false" />
                <input type="hidden" name="_next" value="https://ylanbenlaadam.github.io/football-site/bug.html" />
                <input type="hidden" name="_subject" value="Bug FootAddict" />

                <label for="name">Ton pseudo</label>
                <input type="text" id="name" name="name" placeholder="Ex : Zidane10" required />

                <label for="email">Ton e-mail</label>
                <input type="email" id="email" name="email" placeholder="ton@email.com" required />

                <label for="subject">Page concernée</label>
                <select name="subject" id="subject" required>
                    <option value="" disabled selected>Choisis une page</option>
                    <option value="Accueil">Page d'accueil</option>
                    <option value="Quiz-Bdor">Quiz ballon d'or</option>
                    <option value="Quiz-Club">Quiz club</option>
                    <option value="Quiz-Joueur">Quiz joueur</option>
                    <option value="Jeux">Jeux</option>
                    <option value="autre">Autre</option>
                </select>

                <label for="message">Décris le bug</label>
                <textarea id="message" name="message" rows="6" placeholder="Décris le problème rencontré..." required></textarea>

                <button type="submit" class="btn-submit">Envoyer le signalement ⚽</button>

            <!-- Fermeture du form ICI, après tous les champs -->
            </form>
        </section>

    </main>

    <!-- FOOTER -->
   <footer>
        <div class="footer-container">
            <p>© 2026 FootAddict - Tous droits réservés</p>
            <div class="logo-container">
                <a href="https://x.com/FootAddicttt">
                    <img src="images/twitter-logo.png" alt="Twitter">
                </a>
                <a href="https://www.instagram.com/foot_addictt/">
                    <img src="images/insta-logo.png" alt="Instagram">
                </a>
                <a href="https://discord.gg/RyQT8xwV">
                    <img src="images/discord-logo.png" alt="">
                </a>
            </div>
            <div class="footer-links">
                <a href="./contact.html">Nous contacter</a>
                <a href="./bug.html">Signaler un bug</a>
            </div>
        </div>
</footer>


</body>
</html>
