<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>FootAddict - Devine le joueur</title>
  <link rel="stylesheet" href="../styles/index.css" />
  <link rel="stylesheet" href="./styles/joueur.css" />
</head>
<body>

  <header class="topbar">
    <div class="header-container">
      <div id="logo">⚽ FootAddict</div>
      <nav>
        <ul>
          <li><a href="../index.html#top">Accueil</a></li>
          <li><a href="./quiz.html">Nos Quiz</a></li>
          <li><a href="../index.html#jeux">Jeux Vidéo</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="hero-inner">
        <h1>⚽ Devine le joueur</h1>
        <p id="niveau-label">Chargement du niveau...</p> <!-- remplacer instantanement grace au js par le vraie niveau -->
      </div>
    </section>

    <section class="quiz-player-page">
      <div class="quiz-box">
        <!-- tout ce bloc correspond a la partie quiz normale -->
            <div id="quiz-content">
                <div class="quiz-top">
                    <div class="quiz-progress">
                            Question <span id="question-number">1</span> / <span id="total-questions">5</span>
                    </div>
                    <div class="quiz-score">
                         Score : <span id="score">0</span>
                    </div>
                </div>
                <h2 id="question-title">Chargement...</h2>
                 <p id="question-clues"></p> <!-- permet d'afficher la question grace a javascript -->
                <div id="answers" class="answers-grid"></div><!-- permet d'afficher les reponse grace a javascript -->
                
                <div class="quiz-actions">
                    <button id="next-btn" class="quiz-btn" disabled>Question suivante</button><!-- desactiver au depart mais le js l'active quand la question -->
                </div>
                <p id="feedback" class="feedback"></p><!-- sera remplis avec le texte "bonne reponse ou mauvaise reponse" -->
              </div>

        <!-- tout ce qu'il y a ici est dns une class hidden qu'on met sur none au depart pr pas le voire afficher des le début -->
        <div id="result-box" class="result-box hidden">
          <h2>Quiz terminé 🎉</h2>
          <p>Ton score final est : <strong><span id="final-score">0</span></strong></p>
          <div class="result-actions">
                <a class="quiz-btn link-btn" href="./quiz.html">Retour aux quiz</a>
                <button id="replay-btn" class="quiz-btn" type="button">Rejouer</button>
          </div>
        </div>

      </div>
    </section>
  </main>

<footer>
    <div class="footer-container">
        <p>© 2026 FootAddict - Tous droits réservés</p>
        <div class="logo-container">
            <a href="https://x.com/FootAddicttt">
                <img src="../images/twitter-logo.png" alt="Twitter">
            </a>

            <a href="https://www.instagram.com/foot_addictt/">
                <img src="../images/insta-logo.png" alt="Instagram">
            </a>

            <a href="https://discord.gg/RyQT8xwV">
                <img src="../images/discord-logo.png" alt="">
            </a>
        </div>
        <div class="footer-links">
            <a href="../contact.html">Nous contacter</a>
            <a href="../bug.html">Signaler un bug</a>
        </div>
    </div>
</footer>


  <script src="./javascript/joueur.js"></script>
</body>
</html>
